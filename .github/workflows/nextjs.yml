name: Deploy Vite site to Pages

on:
  # Executa o workflow ao fazer push na branch principal
  push:
    branches: ["main"]

  # Permite executar o workflow manualmente na aba Actions
  workflow_dispatch:

# Define permissões do GITHUB_TOKEN para permitir o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Configuração de concorrência para evitar conflitos de deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de construção
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Detectar gerenciador de pacotes
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
          else
            echo "Gerenciador de pacotes não detectado"
            exit 1
          fi

      - name: Configurar Node.js
        uses: actions/setup-node@v3  # Mantém a versão v3 ou a mais recente
        with:
          node-version: "20" # Ou a versão que você precisa
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Instalar dependências
        run: ${{ steps.detect-package-manager.outputs.manager }} install

      - name: Construir o site com Vite
        run: ${{ steps.detect-package-manager.outputs.manager }} run build

      - name: Fazer upload do artefato de construção
        uses: actions/upload-pages-artifact@v2 # Mantém a versão v2 ou a mais recente
        with:
          path: ./dist

  # Job de implantação
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Fazer deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2 # Mantém a versão v2 ou a mais recente
        with:
          artifact: dist # Nome do artefato que você fez upload no job de build
